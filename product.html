<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0a0807" />
<title id="pgTitle">Kamal Jewellers</title>
<meta name="description" id="metaDesc" content="A limited sale piece from Kamal Jewellers, Sadar Bazar, Delhi." />

<link rel="icon" type="image/png" href="logo.png" />
<link rel="apple-touch-icon" href="logo.png" />

<!-- Social share (filled from the product on load) -->
<meta property="og:type" content="product" />
<meta property="og:site_name" content="Kamal Jewellers" />
<meta property="og:title" id="ogTitle" content="Kamal Jewellers" />
<meta property="og:description" id="ogDesc" content="A limited sale piece from Kamal Jewellers." />
<meta property="og:image" id="ogImage" content="https://kamaljewellers.shop/storefront.jpg" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:image" id="twImage" content="https://kamaljewellers.shop/storefront.jpg" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="site.css" />
<style>
/* ── Product page layout ─────────────────────────────────────── */
body{cursor:none}
.pdp{max-width:1180px;margin:0 auto;padding:clamp(6rem,12vh,8.5rem) clamp(1.2rem,4vw,3rem) 4rem}
.pdp-crumb{font-size:.6rem;letter-spacing:.24em;text-transform:uppercase;color:rgba(243,234,215,.5);margin-bottom:1.6rem}
.pdp-crumb a{color:var(--gold);text-decoration:none;cursor:none}
.pdp-crumb a:hover{color:var(--gold-bright)}
.pdp-grid{display:grid;grid-template-columns:1.05fr 1fr;gap:clamp(1.5rem,4vw,3.5rem);align-items:start}
/* gallery */
.pg-main{position:relative;aspect-ratio:4/5;border-radius:18px;overflow:hidden;background:#0d0b08;
  border:1px solid rgba(255,255,255,.08)}
.pg-main img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .35s var(--ease)}
.pg-off{position:absolute;top:1rem;left:1rem;background:#b82e2e;color:#fff;font-family:'Jost';
  font-size:.6rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;padding:.3rem .7rem;border-radius:20px;z-index:2}
.pg-thumbs{display:flex;gap:.6rem;margin-top:.8rem;flex-wrap:wrap}
.pg-thumb{width:68px;height:84px;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,.12);
  cursor:none;opacity:.6;transition:opacity .25s,border-color .25s}
.pg-thumb.on{opacity:1;border-color:var(--gold)}
.pg-thumb img{width:100%;height:100%;object-fit:cover;display:block}
/* info */
.pi-eyebrow{font-size:.6rem;letter-spacing:.4em;text-transform:uppercase;color:var(--gold);margin-bottom:.8rem}
.pi-name{font-family:'Cormorant Garamond';font-size:clamp(2rem,4.5vw,3.2rem);font-weight:300;line-height:1.05;margin:0 0 .5rem}
.pi-note{font-size:.92rem;color:rgba(243,234,215,.6);line-height:1.5;margin:0 0 1.4rem}
.pi-prices{display:flex;align-items:baseline;gap:.9rem;margin-bottom:.6rem}
.pi-sale{font-family:'Cormorant Garamond';font-size:2.4rem;color:var(--gold-bright);line-height:1}
.pi-orig{font-size:1.05rem;color:rgba(243,234,215,.35);text-decoration:line-through}
.pi-save{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:#7fd99a}
.pi-stock{font-size:.66rem;letter-spacing:.13em;text-transform:uppercase;margin:.4rem 0 1.6rem}
.pi-stock.low{color:#ff9966}.pi-stock.in{color:rgba(243,234,215,.5)}.pi-stock.out{color:#f07878}
/* quantity */
.pi-qty-wrap{display:flex;align-items:center;gap:1.1rem;margin-bottom:1.3rem;flex-wrap:wrap}
.pi-qty-lbl{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold)}
.pi-qty{display:inline-flex;align-items:center;border:1px solid rgba(216,178,94,.35);border-radius:40px;overflow:hidden}
.pi-qty button{width:42px;height:42px;background:transparent;border:none;color:var(--gold-bright);font-size:1.3rem;cursor:none;line-height:1;transition:background .2s}
.pi-qty button:hover{background:rgba(216,178,94,.14)}
.pi-qty button:disabled{opacity:.3;cursor:default}
.pi-qty .n{min-width:46px;text-align:center;font-family:'Cormorant Garamond';font-size:1.4rem;color:var(--cream)}
.pi-total{font-size:.78rem;color:rgba(243,234,215,.55)}
.pi-total b{color:var(--gold-bright);font-size:1.05rem}
/* reserve button */
.pi-reserve{display:flex;align-items:center;justify-content:center;gap:.6rem;width:100%;padding:1.1rem;
  border-radius:44px;border:1px solid rgba(37,211,102,.5);
  background:linear-gradient(150deg,rgba(37,211,102,.22),rgba(18,110,60,.13));backdrop-filter:blur(14px) saturate(150%);
  color:#eafff1;font-family:'Jost';font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;
  text-decoration:none;cursor:none;transition:background .3s,transform .3s var(--ease);
  box-shadow:0 16px 40px -16px rgba(0,0,0,.8),inset 0 1px 0 rgba(255,255,255,.12)}
.pi-reserve:hover{background:linear-gradient(150deg,rgba(37,211,102,.34),rgba(18,110,60,.2));transform:translateY(-2px)}
.pi-reserve svg{width:18px;height:18px;fill:#46e07f;flex:0 0 auto}
.pi-reserve.disabled{border-color:rgba(243,234,215,.2);background:rgba(255,255,255,.04);color:rgba(243,234,215,.4);pointer-events:none;box-shadow:none}
.pi-reserve.disabled svg{display:none}
/* description + details */
.pi-block{margin-top:2.2rem}
.pi-block h3{font-family:'Jost';font-size:.62rem;font-weight:500;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);margin:0 0 .8rem;padding-bottom:.6rem;border-bottom:1px solid rgba(216,178,94,.15)}
.pi-desc{font-size:.94rem;line-height:1.8;color:rgba(243,234,215,.78);white-space:pre-wrap}
.pi-specs{width:100%;border-collapse:collapse}
.pi-specs tr{border-bottom:1px solid rgba(255,255,255,.07)}
.pi-specs td{padding:.6rem .2rem;font-size:.84rem;vertical-align:top}
.pi-specs td.k{color:var(--gold);width:38%;letter-spacing:.04em}
.pi-specs td.v{color:rgba(243,234,215,.8)}
/* reviews */
.pr-sec{max-width:1180px;margin:0 auto;padding:1rem clamp(1.2rem,4vw,3rem) 5rem}
.pr-head{display:flex;align-items:baseline;gap:1rem;flex-wrap:wrap;margin-bottom:1.6rem;
  padding-bottom:1rem;border-bottom:1px solid rgba(216,178,94,.15)}
.pr-head h2{font-family:'Cormorant Garamond';font-size:clamp(1.6rem,3.5vw,2.4rem);font-weight:300;margin:0}
.pr-avg{display:flex;align-items:center;gap:.5rem;font-size:.8rem;color:rgba(243,234,215,.6)}
.pr-avg .stars{color:var(--gold-bright);letter-spacing:.12em}
.pr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
.pr-card{border:1px solid rgba(255,255,255,.09);border-radius:14px;padding:1.3rem;background:rgba(255,255,255,.03)}
.pr-card .stars{color:var(--gold-bright);letter-spacing:.14em;font-size:.85rem;margin-bottom:.6rem}
.pr-card .txt{font-size:.9rem;line-height:1.6;color:rgba(243,234,215,.82);margin:0 0 .8rem}
.pr-card .who{font-size:.64rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold)}
.pr-empty{font-size:.85rem;color:rgba(243,234,215,.4)}
/* not found */
.pdp-404{max-width:560px;margin:0 auto;text-align:center;padding:9rem 1.5rem}
.pdp-404 h1{font-family:'Cormorant Garamond';font-size:2.6rem;font-weight:300;margin:0 0 1rem}
.pdp-404 p{color:rgba(243,234,215,.6);margin-bottom:2rem}
.pdp-back{display:inline-block;padding:.85rem 2rem;border:1px solid var(--gold-deep);border-radius:40px;
  color:var(--gold-bright);text-decoration:none;font-size:.64rem;letter-spacing:.28em;text-transform:uppercase;cursor:none}
@media(max-width:820px){.pdp-grid{grid-template-columns:1fr}.pg-main{max-width:480px}}
@media(hover:none){body{cursor:auto}.pdp-crumb a,.pg-thumb,.pi-qty button,.pi-reserve,.pdp-back{cursor:pointer}}
</style>
</head>
<body>

<!-- custom cursor (matches the rest of the site) -->
<div class="cursor" id="cursor"></div>
<div class="cursor-dot" id="cursorDot"></div>

<!-- nav -->
<nav id="nav" class="scrolled">
  <a class="brand mag" href="index.html"><img class="brand-logo" src="logo.png" alt="" /><span class="brand-text">Kamal Jewellers<small>Sadar Bazar · Delhi</small></span></a>
  <a class="nav-toggle mag" href="index.html#saleSec" style="text-decoration:none"><span>All sale pieces</span></a>
</nav>

<main id="app"><!-- rendered by JS --></main>

<!-- ===== Libraries ===== -->
<script src="config.js"></script>
<script src="content-defaults.js"></script>
<script>
const DEFAULTS = window.KAMAL_DEFAULTS || {};
let CONTENT = JSON.parse(JSON.stringify(DEFAULTS));
const API = ((window.KAMAL_CONFIG || {}).API_BASE) || '/api';
const esc = s => (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const waDigits = n => (n||'').replace(/[^0-9]/g,'');
const inr = n => '₹'+Number(n||0).toLocaleString('en-IN');

function deepMerge(base, over){
  if(Array.isArray(over)) return over;
  if(over && typeof over==='object'){ const o=Object.assign({},base); for(const k in over) o[k]=deepMerge(base?base[k]:undefined, over[k]); return o; }
  return over===undefined?base:over;
}
async function loadContent(){
  try{ const res=await fetch(API+'/content'); if(res.ok){ const {data}=await res.json(); if(data) CONTENT=deepMerge(DEFAULTS,data); } }
  catch(e){ console.warn('content fetch failed',e); }
}
function saleCover(it){ return (it.images&&it.images[0]) || it.photo || ''; }
function salePrice(it){ return Math.round((it.originalPrice||0)*(1-(it.discountPct||0)/100)); }

/* ── Custom cursor ── */
(function(){
  const c=document.getElementById('cursor'), d=document.getElementById('cursorDot');
  if(matchMedia('(hover:none)').matches){ c.style.display='none'; d.style.display='none'; return; }
  let x=innerWidth/2,y=innerHeight/2,cx=x,cy=y;
  addEventListener('mousemove',e=>{x=e.clientX;y=e.clientY;d.style.left=x+'px';d.style.top=y+'px';});
  (function loop(){ cx+=(x-cx)*.18; cy+=(y-cy)*.18; c.style.left=cx+'px'; c.style.top=cy+'px'; requestAnimationFrame(loop); })();
  addEventListener('mouseover',e=>{ if(e.target.closest('a,button,.pg-thumb')) c.classList.add('hover'); else c.classList.remove('hover'); });
})();

function getId(){ return new URLSearchParams(location.search).get('id'); }

function render(){
  const app=document.getElementById('app');
  const id=getId();
  const item=(CONTENT.saleItems||[]).find(i=>i.id===id);

  if(!item || item.active===false){
    app.innerHTML=`<div class="pdp-404">
      <h1>Piece not found</h1>
      <p>This item may have sold out or been taken off sale.</p>
      <a class="pdp-back" href="index.html#saleSec">← Back to the sale</a>
    </div>`;
    document.getElementById('pgTitle').textContent='Not found · Kamal Jewellers';
    return;
  }

  const sp=salePrice(item);
  const images=(item.images&&item.images.length?item.images:(item.photo?[item.photo]:[]));
  const cover=images[0]||'';
  const stock=Number(item.stock)||0;
  const soldOut=stock<=0;
  const low=!soldOut&&stock<=3;

  // SEO / share
  document.getElementById('pgTitle').textContent=`${item.name} · Sale · Kamal Jewellers`;
  const desc=item.note||item.description||`${item.name} — now ${inr(sp)} at Kamal Jewellers.`;
  document.getElementById('metaDesc').setAttribute('content',desc);
  document.getElementById('ogTitle').setAttribute('content',`${item.name} — ${inr(sp)}`);
  document.getElementById('ogDesc').setAttribute('content',desc);
  if(cover){
    const abs=cover.startsWith('http')?cover:location.origin+'/'+cover.replace(/^\//,'');
    document.getElementById('ogImage').setAttribute('content',abs);
    document.getElementById('twImage').setAttribute('content',abs);
  }

  const details=(item.details||[]).filter(d=>d.label||d.value);
  const reviews=(item.reviews||[]).filter(r=>r.text||r.name);
  const avg=reviews.length?(reviews.reduce((s,r)=>s+(Number(r.rating)||5),0)/reviews.length):0;
  const stars=n=>'★'.repeat(Math.round(n))+'☆'.repeat(5-Math.round(n));

  app.innerHTML=`
    <section class="pdp">
      <div class="pdp-crumb"><a href="index.html">Home</a> › <a href="index.html#saleSec">Sale</a> › ${esc(item.name)}</div>
      <div class="pdp-grid">
        <div class="pg">
          <div class="pg-main">
            ${item.discountPct?`<div class="pg-off">−${item.discountPct}% OFF</div>`:''}
            <img id="pgMain" src="${esc(cover)}" alt="${esc(item.name)}" />
          </div>
          ${images.length>1?`<div class="pg-thumbs">${images.map((u,i)=>`<div class="pg-thumb${i===0?' on':''}" data-i="${i}"><img src="${esc(u)}" alt=""></div>`).join('')}</div>`:''}
        </div>
        <div class="pi">
          <div class="pi-eyebrow">${item.sku?esc(item.sku)+' · ':''}Limited sale piece</div>
          <h1 class="pi-name">${esc(item.name)}</h1>
          ${item.note?`<p class="pi-note">${esc(item.note)}</p>`:''}
          <div class="pi-prices">
            <span class="pi-sale">${inr(sp)}</span>
            ${item.discountPct?`<span class="pi-orig">${inr(item.originalPrice)}</span><span class="pi-save">Save ${inr((item.originalPrice||0)-sp)}</span>`:''}
          </div>
          <div class="pi-stock ${soldOut?'out':(low?'low':'in')}">${soldOut?'Sold out':(low?`Only ${stock} left!`:`${stock} in stock`)}</div>

          <div class="pi-qty-wrap" ${soldOut?'style="display:none"':''}>
            <span class="pi-qty-lbl">Quantity</span>
            <div class="pi-qty">
              <button id="qDec" aria-label="Decrease">−</button>
              <span class="n" id="qN">1</span>
              <button id="qInc" aria-label="Increase">+</button>
            </div>
            <span class="pi-total">Total: <b id="qTotal">${inr(sp)}</b></span>
          </div>

          ${soldOut
            ? `<span class="pi-reserve disabled">Sold out</span>`
            : `<a class="pi-reserve" id="reserveBtn" target="_blank" rel="noopener">
                 <svg viewBox="0 0 32 32" aria-hidden="true"><path d="M16 3C9.4 3 4 8.3 4 14.9c0 2.3.6 4.4 1.8 6.3L4 29l8-2.1c1.8 1 3.8 1.5 6 1.5 6.6 0 12-5.3 12-11.9S22.6 3 16 3zm5.5 16.3c-.3-.2-1.8-.9-2-1-.3-.1-.5-.2-.7.1-.2.3-.8 1-.9 1.1-.2.2-.3.2-.6.1-.3-.2-1.3-.5-2.4-1.5-.9-.8-1.5-1.8-1.7-2.1-.2-.3 0-.5.1-.6l.5-.5c.2-.2.2-.3.3-.5.1-.2 0-.4 0-.5l-.9-2.2c-.2-.6-.5-.5-.7-.5h-.6c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.5s1.1 2.9 1.2 3.1c.2.2 2.1 3.3 5.1 4.6.7.3 1.3.5 1.7.6.7.2 1.4.2 1.9.1.6-.1 1.8-.7 2-1.4.3-.7.3-1.3.2-1.4-.1-.2-.3-.2-.6-.4z"/></svg>
                 Reserve via WhatsApp
               </a>`}

          ${item.description?`<div class="pi-block"><h3>Description</h3><div class="pi-desc">${esc(item.description)}</div></div>`:''}
          ${details.length?`<div class="pi-block"><h3>Product details</h3>
            <table class="pi-specs"><tbody>${details.map(d=>`<tr><td class="k">${esc(d.label)}</td><td class="v">${esc(d.value)}</td></tr>`).join('')}</tbody></table>
          </div>`:''}
        </div>
      </div>
    </section>

    <section class="pr-sec">
      <div class="pr-head">
        <h2>Customer reviews</h2>
        ${reviews.length?`<div class="pr-avg"><span class="stars">${stars(avg)}</span> ${avg.toFixed(1)} · ${reviews.length} review${reviews.length>1?'s':''}</div>`:''}
      </div>
      ${reviews.length
        ? `<div class="pr-grid">${reviews.map(r=>`<div class="pr-card">
              <div class="stars">${stars(Number(r.rating)||5)}</div>
              ${r.text?`<p class="txt">${esc(r.text)}</p>`:''}
              ${r.name?`<div class="who">— ${esc(r.name)}</div>`:''}
            </div>`).join('')}</div>`
        : `<p class="pr-empty">No reviews yet for this piece.</p>`}
    </section>`;

  // gallery thumb switching
  const main=document.getElementById('pgMain');
  app.querySelectorAll('.pg-thumb').forEach(t=>{
    t.addEventListener('click',()=>{
      const i=Number(t.dataset.i);
      main.style.opacity='0';
      setTimeout(()=>{ main.src=images[i]; main.style.opacity='1'; },180);
      app.querySelectorAll('.pg-thumb').forEach(x=>x.classList.toggle('on',x===t));
    });
  });

  // quantity + reserve
  if(!soldOut){
    let qty=1;
    const qN=document.getElementById('qN'), qTotal=document.getElementById('qTotal');
    const dec=document.getElementById('qDec'), inc=document.getElementById('qInc');
    const btn=document.getElementById('reserveBtn');
    const wa=waDigits((CONTENT.contact||{}).whatsapp);
    const sync=()=>{
      qN.textContent=qty;
      qTotal.textContent=inr(sp*qty);
      dec.disabled=qty<=1; inc.disabled=qty>=stock;
      const msg=`Hi Kamal Jewellers! I'd like to reserve ${qty} × "${item.name}"${item.sku?` (${item.sku})`:''} at ${inr(sp)} each — total ${inr(sp*qty)}. Is it available?`;
      btn.href= wa ? `https://wa.me/${wa}?text=${encodeURIComponent(msg)}` : '#';
    };
    dec.addEventListener('click',()=>{ if(qty>1){qty--;sync();} });
    inc.addEventListener('click',()=>{ if(qty<stock){qty++;sync();} });
    sync();
  }
}

loadContent().then(render).catch(e=>{ console.error(e); render(); });
</script>
</body>
</html>
